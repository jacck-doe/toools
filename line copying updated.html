<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Textarea → Lines with Copy</title>

<style>

/* Reset */
*{
box-sizing:border-box;
}

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f5f7fa;
color:#1e293b;
margin:0;
padding:40px 20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:800px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
margin-top:0;
font-size:28px;
}

p{
color:#64748b;
margin-bottom:20px;
}

textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
resize:vertical;
}

textarea:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

button{
padding:8px 14px;
border-radius:8px;
border:none;
cursor:pointer;
font-size:14px;
font-weight:500;
}

#processBtn{
background:#3b82f6;
color:white;
}

#copyAllBtn{
background:#10b981;
color:white;
margin-left:8px;
}

ul{
list-style:none;
padding:0;
margin-top:25px;
}

li{
display:flex;
align-items:flex-start;
gap:10px;
background:#f8fafc;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

li:hover{
background:#eef2ff;
}

li button{
background:#e2e8f0;
color:#334155;
flex-shrink:0;
}

pre{
margin:0;
font-family:Consolas,Monaco,monospace;
font-size:13px;
white-space:pre-wrap;
word-break:break-word;
}

/* copied style */

li.copied{
background:#d1fae5;
border-left:4px solid #10b981;
}

li.copied button{
background:#10b981;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>Textarea → Lines with Copy</h1>

<p>Paste text then click process.</p>

<textarea id="textInput" rows="10"></textarea>
<br><br>

<button id="processBtn">Process</button>
<button id="copyAllBtn">Copy All Lines</button>

<ul id="lines"></ul>

</div>

<script>

const textInput=document.getElementById("textInput")
const processBtn=document.getElementById("processBtn")
const linesContainer=document.getElementById("lines")
const copyAllBtn=document.getElementById("copyAllBtn")

processBtn.addEventListener("click",()=>{

const lines=textInput.value.split(/\r?\n/)
renderLines(lines)

})

linesContainer.addEventListener("click",async(e)=>{

if(!e.target.matches("button[data-line]")) return

const text=e.target.dataset.line

const success=await copyToClipboard(text)

if(success){

showFeedback(e.target)

e.target.closest("li").classList.add("copied")

}

})

copyAllBtn.addEventListener("click",async()=>{

const combined=Array.from(linesContainer.querySelectorAll("pre"))
.map(p=>p.textContent)
.join("\n")

const success=await copyToClipboard(combined)

if(success){

showFeedback(copyAllBtn)

}

})

function renderLines(lines){

linesContainer.innerHTML=""

const fragment=document.createDocumentFragment()

lines.forEach(line=>{

const li=document.createElement("li")

const btn=document.createElement("button")

btn.textContent="Copy"
btn.dataset.line=line

const pre=document.createElement("pre")

pre.textContent=line

li.appendChild(btn)
li.appendChild(pre)

fragment.appendChild(li)

})

linesContainer.appendChild(fragment)

}

async function copyToClipboard(text){

try{

await navigator.clipboard.writeText(text)

return true

}catch{

const ta=document.createElement("textarea")

ta.value=text

ta.style.position="fixed"
ta.style.left="-9999px"

document.body.appendChild(ta)

ta.select()

document.execCommand("copy")

document.body.removeChild(ta)

return true

}

}

function showFeedback(button){

const original=button.textContent

button.textContent="Copied"

setTimeout(()=>{

button.textContent=original

},1000)

}

</script>

</body>
</html>
